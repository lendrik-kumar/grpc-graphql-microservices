schema:
  - schema.graphql

exec:
  filename: generated.go
  package: main

model:
  filename: models_gen.go
  package: main

resolver:
  layout: follow-schema
  dir: .
  package: main

models:
  Account:
    model: github.com/lendrik-kumar/graphql-grpc-go-microservices/graphql.Account
    fields:
      orders:
        resolver: true
